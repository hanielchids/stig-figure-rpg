services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: stickwars
      POSTGRES_PASSWORD: stickwars_dev
      POSTGRES_DB: stickwars_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://stickwars:stickwars_dev@db:5432/stickwars_production
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: changeme_in_production_use_rails_secret
    command: >
      bash -c "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"

volumes:
  postgres_data:
